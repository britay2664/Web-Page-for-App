<!DOCTYPE html>
<html>
<head>
    <!--
        Author: Brian Taylor
        Date: 06/06/2026
        Purpose: This page demonstrates how to share JavaScript files across multiple HTML pages. It includes a form for creating a greeting card, and the JavaScript file will handle the form submission and display a preview of the greeting card on a separate page.
    -->
    <meta charset="utf-8" />
    <meta id="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Sharing Script Files</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="modernizr.custom.65897.js"></script>
</head>

<body>
    <header>
        <h1>
            BriTay2664, Sharing Script Files
        </h1>
    </header>

    <article>
        <h2>Create Greeting Card</h2>

        <form action="Preview.html">
            <fieldset id="info">
                <label for="greetinginput">Greeting Text</label>
                <input type="text" id="greetinginput" name="greeting" />
            </fieldset>

            <fieldset id="submitbutton">
                <input type="submit" id="submit" value="Preview" />
            </fieldset>
        </form>
    </article>

    <script src="script.js"></script>
</body>
</html>
