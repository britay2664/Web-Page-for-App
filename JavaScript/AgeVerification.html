```html
<!DOCTYPE html>
<html lang="en">

<head>
    <!--
        Author: Brian Taylor
        Date: June 12, 2026
        Purpose: Demonstrate jQuery and validator.js for live form validation.
    -->

    <meta charset="utf-8">
    <title>Simple Form Validation</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/validator@13.11.0/validator.min.js"></script>
</head>

<body>

    <h1>BriTay2664 — Age Verification</h1>

    <form id="simpleForm" novalidate>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email">
        <div id="emailError" style="color:red;"></div>

        <br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age">
        <div id="ageError" style="color:red;"></div>

        <br>

        <button type="submit">Submit</button>

    </form>

    <script src="SimpleValidation.js"></script>

</body>

</html>
