<!DOCTYPE html>
<html>

<head>
    <!--
        Author: Brian Taylor
        Date: 05/20/2026
        Purpose: This page allows users to enter a number of miles,
        converts it to kilometers, and displays the conversion in a list
        after 5 entries.
    -->

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>Console Debugging</title>

    <link rel="stylesheet" href="styles.css" />

    <script src="modernizr.custom.05819.js"></script>
</head>

<body>

    <header>
        <h1>
            BriTay2664, Console Debugging
        </h1>
    </header>

    <article>

        <div id="results">

            <p id="resultsExpl"></p>

            <ul>
                <li id="item1"></li>
                <li id="item2"></li>
                <li id="item3"></li>
                <li id="item4"></li>
                <li id="item5"></li>
            </ul>

        </div>

        <form>

            <fieldset>

                <label for="mValue" id="mLabel">
                    Type the number of miles to convert to kilometers,
                    then click Submit:
                </label>

                <input type="text" id="mValue" />

            </fieldset>

            <fieldset>

                <button type="button" id="button">
                    Submit
                </button>

            </fieldset>

        </form>

    </article>

    <script>

        //"use strict"

        // New array to store entered places

        var places = [];

        // Counter variable

        var i = 1;

        // Get textbox element

        var milesElement = document.getElementById("mValue");

        // Convert miles to kilometers

        function convert() {

            return milesElement.value * 1.6;

        }

        // Function to add input to array
        // and generate list after 5th submission

        function processInput() {

            var convStr =
                milesElement.value + " miles is " +
                convert().toFixed(2) + " km";

            // Store conversion message in array

            places[i] = convStr;

            // Clear textbox

            milesElement.value = "";

            // Increment counter until 5 entries

            if (i < 5) {

                i++;

            }
            else {

                // Display results heading

                document.getElementById("resultsExpl").innerHTML =
                    "Converted Values:";

                var listItem = "";

                // Write array values to list items

                for (var j = 1; j <= 5; j++) {

                    listItem = "item" + j;

                    document.getElementById(listItem).innerHTML =
                        places[j];

                }

            }

        }

        // Add backward-compatible event listener

        var submitButton = document.getElementById("button");

        if (submitButton.addEventListener) {

            submitButton.addEventListener("click", processInput, false);

        }
        else if (submitButton.attachEvent) {

            submitButton.attachEvent("onclick", processInput);

        }

    </script>

</body>

</html>
