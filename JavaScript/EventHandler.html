<!DOCTYPE html>
<html>

<head>

    <!--
    Author: Brian Taylor
    Date: 2023-10-01
    Purpose: Demonstrate event handling in HTML
    -->

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>Event Handler</title>

    <link rel="stylesheet" href="styles.css" />

    <script src="modernizr.custom.05819.js"></script>

</head>

<body>

    <header>
        <h1>
            BriTay2664 - Event Handler
        </h1>
    </header>

    <article>

        <h2>Shipping Address</h2>

        <form>

            <fieldset id="addroptions">

                <legend>
                    <span>Choose an address</span>
                </legend>

                <!-- Home Address Option -->

                <label for="homeoption" id="homeaddr">

                    <span>Home</span><br />

                    1 Main St.<br />
                    Sicilia, MA 02103

                    <input
                        type="radio"
                        id="homeoption"
                        name="shippingaddr"

                        onclick="
                            document.getElementById('streetinput').value = '1 Main St.';
                            document.getElementById('cityinput').value = 'Sicilia';
                            document.getElementById('stateinput').value = 'MA';
                            document.getElementById('zipinput').value = '02103';
                        "
                    />

                </label>

                <!-- Work Address Option -->

                <label for="workoption" id="workaddr">

                    <span>Work</span><br />

                    123 Robin Ln.<br />
                    Crab City, MA 02104

                    <input
                        type="radio"
                        id="workoption"
                        name="shippingaddr"

                        onclick="
                            document.getElementById('streetinput').value = '123 Robin Ln.';
                            document.getElementById('cityinput').value = 'Crab City';
                            document.getElementById('stateinput').value = 'MA';
                            document.getElementById('zipinput').value = '02104';
                        "
                    />

                </label>

            </fieldset>

            <fieldset id="contactinfo">

                <label for="streetinput">
                    Street Address

                    <input type="text" id="streetinput" />
                </label>

                <label for="cityinput">
                    City

                    <input type="text" id="cityinput" />
                </label>

                <label for="stateinput">
                    State

                    <input type="text" id="stateinput" />
                </label>

                <label for="zipinput">
                    Zip

                    <input type="text" id="zipinput" />
                </label>

            </fieldset>

        </form>

    </article>

</body>

</html>
