<!DOCTYPE html>
<html>

<head>
    <!--
    Author: Brian Taylor
    Date: 05/31/2026
    Purpose: This page demonstrates how to open a timed confirmation window when the user submits a change of address form. The confirmation window will automatically close after 5 seconds.
    -->

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>Timed Window</title>

    <link rel="stylesheet" href="../GP%20Starter%20Files_Timed%20Window/styles.css" />
    <script src="../GP%20Starter%20Files_Timed%20Window/modernizr.custom.05819.js"></script>
</head>

<body>

    <header>
        <h1>
            BriTay2664, Timed Window
        </h1>
    </header>

    <article>
        <h2>Change of address form</h2>

        <form>
            <fieldset id="contactinfo">

                <label for="addrinput">
                    Street Address
                </label>
                <input type="text" id="addrinput" name="Address" />

                <label for="cityinput">
                    City
                </label>
                <input type="text" id="cityinput" name="City" />

                <label for="stateinput">
                    State/Province
                </label>
                <input type="text" id="stateinput" name="State" />

                <label for="zipinput">
                    Zip/Postal Code
                </label>
                <input type="number" id="zipinput" name="Zip" />

            </fieldset>

            <fieldset id="submitsection">
                <input type="button" id="submit" value="Submit" />
            </fieldset>
        </form>
    </article>

    <script>
        "use strict";

        var confirmWindow;

        /*
            Opens a small confirmation window and sets a timer
            to close it after 5 seconds.
        */
        function processInput() {

            // Popup dimensions
            var propertyWidth = 300;
            var propertyHeight = 100;

            // Calculate centered position on the current screen
            var winLeft = ((screen.width - propertyWidth) / 2);
            var winTop = ((screen.height - propertyHeight) / 2);

            // Build window features string
            var winOptions = "width=300,height=100";
            winOptions += ",left=" + winLeft;
            winOptions += ",top=" + winTop;

            // Open the confirmation window
            confirmWindow = window.open("confirm.html", "confirm", winOptions);

            // Close the confirmation window after 5 seconds
            setTimeout(function () {
                confirmWindow.close();
            }, 5000);
        }

        /*
            Creates the event listener for the Submit button.
        */
        function createEventListener() {

            var submitButton = document.getElementById("submit");

            if (submitButton.addEventListener) {
                submitButton.addEventListener("click", processInput, false);
            }
            else if (submitButton.attachEvent) {
                submitButton.attachEvent("onclick", processInput);
            }
        }

        /*
            Runs the setup function after the page loads.
        */
        if (window.addEventListener) {
            window.addEventListener("load", createEventListener, false);
        }
        else if (window.attachEvent) {
            window.attachEvent("onload", createEventListener);
        }
    </script>

</body>

</html>
