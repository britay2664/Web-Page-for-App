<!DOCTYPE html>
<html>
<head>
    <!--
        Author: Brian Taylor
        Date: 06/06/2026
        Purpose: This page demonstrates how to use cookies in JavaScript to store and retrieve user data. The page includes a login form where users can enter their username and password, and an option to remember their login information using cookies. When the user submits the form, the JavaScript will handle the form data, set a cookie if the "Remember me" option is selected, and display an error message if the login credentials are incorrect.   
    -->
    <meta charset="utf-8" />
    <meta id="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0; user-scalable=0">
    <title>Cookies</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="modernizr.custom.65897.js"></script>
</head>

<body>
    <header>
        <h1>
            BriTay2664, Cookies
        </h1>
    </header>

    <article>
        <div id="errorMessage"></div>

        <form action="Results.html">
            <fieldset id="deliveryinfo">
                <legend>Site Login</legend>

                <label for="usernameinput">Username</label>
                <input type="text" id="usernameinput" name="username" />

                <label for="passwordinput">Password</label>
                <input type="password" id="passwordinput" name="password" />

                <input type="checkbox" id="rememberinput" name="remember" value="remember" />
                <label for="rememberinput" id="rememberlabel">Remember me</label>
            </fieldset>

            <fieldset id="submitbutton">
                <input type="submit" id="submitBtn" value="Login" />
            </fieldset>
        </form>
    </article>

    <script src="script.js"></script>
</body>
</html>
