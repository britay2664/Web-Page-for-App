<!DOCTYPE html>
<html>

<head>
    <!--
    Author: Brian Taylor
    Date: May 16, 2026
    Purpose: Use JavaScript to create dynamic HTML content for a webpage about shipping address selection and auto-filling form fields based on user input.
    -->

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>Variables and Alerts</title>

    <link rel="stylesheet" href="styles.css" />
    <script src="modernizr.custom.05819.js"></script>
</head>

<body>

    <header>
        <h1>BriTay2664  Variables and Alerts</h1>
    </header>

    <article>
        <h2>Shipping Address</h2>

        <form>
            <fieldset id="addroptions">
                <legend>
                    <span>Choose an address</span>
                </legend>

                <label for="homeoption" id="homeaddr">
                    <span>Home</span><br />
                    100 Main St.<br />
                    Sicilia, MA 02103

                    <input type="radio" id="homeoption" name="shippingaddr" />
                </label>

                <label for="workoption" id="workaddr">
                    <span>Work</span><br />
                    123 Robin Ln.<br />
                    Crab City, MA 02104

                    <input type="radio" id="workoption" name="shippingaddr" />
                </label>
            </fieldset>

            <fieldset id="contactinfo">
                <label for="streetinput">
                    Street Address
                    <input type="text" id="streetinput" />
                </label>

                <label for="cityinput">
                    City
                    <input type="text" id="cityinput" />
                </label>

                <label for="stateinput">
                    State
                    <input type="text" id="stateinput" />
                </label>

                <label for="zipinput">
                    Zip
                    <input type="text" id="zipinput" />
                </label>
            </fieldset>
        </form>
    </article>

    <script>
        // Create alert message
        var homeMsg = "You selected the Home address";
        var workMsg = "You selected the Work address";

        // Auto fill home address and display alert
        document.getElementById("homeoption").onclick = function () {
            alert(homeMsg);
            document.getElementById("streetinput").value = "100 Main St.";
            document.getElementById("cityinput").value = "Sicilia";
            document.getElementById("stateinput").value = "MA";
            document.getElementById("zipinput").value = "02103";
        };

        // Auto fill work address and display alert
        document.getElementById("workoption").onclick = function () {
            alert(workMsg);
            document.getElementById("streetinput").value = "123 Robin Ln.";
            document.getElementById("cityinput").value = "Crab City";
            document.getElementById("stateinput").value = "MA";
            document.getElementById("zipinput").value = "02104";
        };
    </script>

</body>

</html>
