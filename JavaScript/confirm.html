<!DOCTYPE html>
<html>

<head>
    <!--
    Author:Brian Taylor
    Date: 05/31/2026
    Purpose: This page demonstrates how to open a timed confirmation window when the user submits a change of address form. The confirmation window will automatically close after 5 seconds.
    -->

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudentID, Confirmation</title>

    <style>

        /* Center all inline content on the page */

        body {
            text-align: center;
        }

        /* Style the Close element to look like a button */

        #closeB {
            display: inline-block;
            background: green;
            color: white;
            font-size: 10pt;
            padding: 5px;
        }

        /* Show default cursor on hover */

        #closeB:hover {
            cursor: default;
        }

    </style>

</head>

<body>

    <p>Your address has been updated.</p>

    <!-- Clickable element that acts like a close button -->

    <p id="closeB">Close</p>

    <script>

        /**
         * Attempts to close the current browser window.
         * Most browsers only allow this if the window
         * was opened by JavaScript using window.open().
         */

        function closeWindow() {

            window.close();

        }

        /*
            Creates event listener for the Close button.
        */

        function createEventListener() {

            var submitButton = document.getElementById("closeB");

            if (submitButton.addEventListener) {

                submitButton.addEventListener("click", closeWindow, false);

            }
            else if (submitButton.attachEvent) {

                submitButton.attachEvent("onclick", closeWindow);

            }

        }

        /*
            Run setup after page loads.
        */

        if (window.addEventListener) {

            window.addEventListener("load", createEventListener, false);

        }
        else if (window.attachEvent) {

            window.attachEvent("onload", createEventListener);

        }

    </script>

</body>

</html>
