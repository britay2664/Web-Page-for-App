!DOCTYPE html>
<html>
<head>
    <title>Interactive Intro</title>
</head>
<body>
    <h1>Welcome to My Page</h1>
    <div id="name"></div>
    <p id="bio">This is a short bio about me.</p>
    <div id="interests">
        <ul>
            <li>Interest 1</li>
            <li>Interest 2</li>
            <li>Interest 3</li>
        </ul>
    </div>
    <button id="changeButton">Change Theme</button>

    <script>
    // Prompt the user for their name
    var name = prompt("What is your name?");
    
    // Alert the user with a welcome message
    alert("Welcome, " + name + "!");
    
    // Update the name element with the user's name
    document.getElementById("name").innerText = "Hello, " + name + "!";

    function changeTheme() {
    // Change the background color of the body
    document.body.style.backgroundColor = 
        document.body.style.backgroundColor === 'lightblue' ? 'lightgreen' : 'lightblue';
}

    // Add event listener to the button to change the theme when clicked
    document.getElementById("changeButton").addEventListener("click", changeTheme);
    </script>
</script>

</body>
</html>
